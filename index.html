<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Map</title>
  <script src="stuquery.min.js"></script>
  <script src="virtualsky.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #starmap {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Overlay: pointer-events none so mouse falls through to canvas */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    #content {
      position: absolute;
      top: 10%;
      left: 5%;
      color: white;
      font-family: 'Times New Roman', Times, serif;
      font-size: 21px;
      line-height: 1.6;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    .clickable {
      pointer-events: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="starmap"></div>

  <div id="overlay">
    <div id="content">
      <!-- ✏️ Your content here -->
    </div>
  </div>

  <script>
    S(document).ready(function () {

      var planetarium = S.virtualsky({
        id: 'starmap',
        projection: 'stereo',
        latitude: 48.379471,
        longitude: -114.24657,
        live: true,
        scalestars: 2,
        az: 180,
        mouse: true,   // keep mouse enabled — we drive it via synthetic events
        keyboard: false
      });

      // Get the canvas element VirtualSky draws into
      function getCanvas() {
        return document.querySelector('#starmap canvas');
      }

      var lastX = null;
      var lastY = null;
      var isDragging = false;

      // Helper to fire a pointer/mouse event on the canvas
      function fireEvent(canvas, type, x, y) {
        var evt = new MouseEvent(type, {
          bubbles: true,
          cancelable: true,
          clientX: x,
          clientY: y
        });
        canvas.dispatchEvent(evt);
      }

      document.addEventListener('mousemove', function (e) {
        var canvas = getCanvas();
        if (!canvas) return;

        var cx = window.innerWidth  / 2;
        var cy = window.innerHeight / 2;

        var dx = e.clientX - cx;
        var dy = e.clientY - cy;

        // Dead zone: don't drag if cursor is near center
        var deadZone = 30;
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < deadZone) {
          // Release drag when back near center
          if (isDragging) {
            fireEvent(canvas, 'mouseup', e.clientX, e.clientY);
            isDragging = false;
            lastX = null;
            lastY = null;
          }
          return;
        }

        // Scale drag speed by distance from center
        var speed = 0.3;
        var targetX = cx + dx * speed;
        var targetY = cy + dy * speed;

        if (!isDragging) {
          // Start a drag from the center of the screen
          fireEvent(canvas, 'mousedown', cx, cy);
          isDragging = true;
          lastX = cx;
          lastY = cy;
        }

        // Continue the drag toward where the cursor is pointing
        fireEvent(canvas, 'mousemove', targetX, targetY);
        lastX = targetX;
        lastY = targetY;
      });

      // Release drag if cursor leaves the window
      document.addEventListener('mouseleave', function () {
        var canvas = getCanvas();
        if (canvas && isDragging) {
          fireEvent(canvas, 'mouseup', lastX || 0, lastY || 0);
          isDragging = false;
          lastX = null;
          lastY = null;
        }
      });

    });
  </script>

</body>
</html>
